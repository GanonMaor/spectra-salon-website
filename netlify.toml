# ═══════════════════════════════════════════════════════════════════════
#  Spectra Salon — Netlify Deploy Config (salonos.ai)
#  Stack: Vite + React 18 → Netlify Functions (JS) → Neon PostgreSQL
#  STRICT rules: fail build on error, enforce security, cache correctly
# ═══════════════════════════════════════════════════════════════════════

# ── Build ─────────────────────────────────────────────────────────────

[build]
  command   = "npm ci && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  VITE_APP_NAME = "Spectra Salon"
  CI = "true"
  NPM_CONFIG_PRODUCTION = "false"
  SECRETS_SCAN_OMIT_KEYS  = "VITE_GOOGLE_MAPS_API_KEY,VITE_GOOGLE_API_KEY"
  SECRETS_SCAN_OMIT_PATHS = "dist/**,**/*.map,**/*.md"

# ── Build Contexts ────────────────────────────────────────────────────

[context.production]
  command = "npm ci && npm run build"

[context.deploy-preview]
  command = "npm ci && npm run build"

[context.branch-deploy]
  command = "npm ci && npm run build"

# ── Dev Server ────────────────────────────────────────────────────────

[dev]
  framework  = "vite"
  command    = "npm run dev:vite"
  targetPort = 3000
  port       = 8888
  autoLaunch = false
  publish    = "dist"

# ── Netlify Functions ─────────────────────────────────────────────────

[functions]
  node_bundler          = "esbuild"
  external_node_modules = ["@neondatabase/serverless", "pg", "xlsx", "axios"]

[functions."*"]
  included_files = ["netlify/functions/**"]

# ── SPA Routing (MUST be last redirect — catch-all) ──────────────────

# API functions get routed first (Netlify handles /.netlify/* automatically)

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers (all pages) ─────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-XSS-Protection         = "1; mode=block"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "frame-ancestors 'none'"

# ── Cache: Vite hashed assets (long-lived, immutable) ────────────────

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: Images ─────────────────────────────────────────────────────

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: Fonts ──────────────────────────────────────────────────────

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: HTML (never cache — must revalidate for SPA updates) ──────

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: Netlify Functions API responses ────────────────────────────

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin  = "https://salonos.ai"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ── noindex: internal/hidden pages ────────────────────────────────────

[[headers]]
  for = "/crm/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/lead-capture"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/salon-performance"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/market-intelligence"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/new-investors-deck"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/new-investors-deck-v2"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/investors-ai-flywheel"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/loreal-analytics"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ═══════════════════════════════════════════════════════════════════════
#  Required Environment Variables (set in Netlify UI → Site → Env vars)
# ═══════════════════════════════════════════════════════════════════════
#
#  DATABASE_URL          — Neon PostgreSQL connection string (pooled)
#  OPENAI_API_KEY        — OpenAI key for schedule-ai, hero-ai, hairgpt
#  VITE_GOOGLE_MAPS_API_KEY — Google Maps (client-side, VITE_ prefix)
#
#  NEVER put secrets in this file or in the repo.
#  All secrets live in Netlify UI → Site settings → Environment variables.
# ═══════════════════════════════════════════════════════════════════════
